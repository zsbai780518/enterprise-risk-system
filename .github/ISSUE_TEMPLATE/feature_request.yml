name: 💡 功能建议
description: 提出新功能建议
title: "[Feature]: "
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出功能建议！请描述您希望添加的功能。
  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 这个功能解决了什么问题？
      placeholder: 例如：我经常需要...但是目前...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 您希望如何实现这个功能？
      placeholder: 描述您期望的功能行为
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 您考虑过其他替代方案吗？
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个功能对您的重要程度？
      options:
        - 🔴 高（必须）
        - 🟡 中（应该）
        - 🟢 低（可以）
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他想说明的信息（可选）
