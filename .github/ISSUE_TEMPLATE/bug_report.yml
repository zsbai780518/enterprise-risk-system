name: 🐛 Bug 报告
description: 报告一个 bug 帮助我们改进
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间报告 bug！请提供以下信息帮助我们定位问题。
  - type: input
    id: version
    attributes:
      label: 版本号
      description: 您使用的版本是什么？
      placeholder: 例如：v1.0.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 运行平台
      description: 您在哪个平台上遇到问题？
      options:
        - 后端 (ThinkPHP)
        - 前端 (UniAPP)
        - 数据库
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请详细描述您遇到的问题
      placeholder: 包括发生了什么、期望的行为是什么
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个 bug？
      placeholder: |
        1. 打开...
        2. 点击...
        3. 输入...
        4. 出现错误
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 请复制粘贴相关错误日志
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如有截图请上传（可选）
